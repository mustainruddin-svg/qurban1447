<style>
:root{
  --sky:#0284C7;--sky-deep:#0369A1;--sky-light:#BAE6FD;--sky-ultra:#E0F2FE;
  --gold:#B8892A;--gold-w:#D4A84B;--gold-p:#F5E6C0;
  --white:#FFFFFF;--off:#F8FAFC;
  --ink:#0F172A;--ink-m:#334155;--ink-s:#64748B;--ink-mu:#94A3B8;
  --bdr:#E2E8F0;--green:#16a34a;
  --r:12px;--rl:20px;--rxl:32px;
  --sh:0 4px 20px rgba(2,132,199,.12);
  --shl:0 20px 60px rgba(2,132,199,.18);
  --ff-d:'Cormorant Garamond',Georgia,serif;
  --ff-b:'Plus Jakarta Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--ff-b);font-size:15px;color:var(--ink);background:var(--off);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%}
button{cursor:pointer;border:none;background:none;font-family:inherit}
a{text-decoration:none;color:inherit}
h1,h2,h3,h4{font-family:var(--ff-d);line-height:1.15}
h1{font-size:clamp(2rem,6vw,3.6rem);font-weight:700}
h2{font-size:clamp(1.5rem,3.5vw,2.4rem);font-weight:600}
.container{width:100%;max-width:1100px;margin:0 auto;padding:0 20px}

/* HEADER */
.site-header{position:fixed;top:0;left:0;right:0;z-index:900;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(2,132,199,.12);transition:box-shadow .3s}
.site-header.scrolled{box-shadow:var(--sh)}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 20px;max-width:1100px;margin:0 auto}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-badge{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,var(--sky),var(--sky-deep));display:flex;align-items:center;justify-content:center;font-family:var(--ff-d);font-weight:700;font-size:16px;color:#fff;box-shadow:0 2px 8px rgba(2,132,199,.35)}
.logo-text span:first-child{display:block;font-family:var(--ff-d);font-weight:700;font-size:14px;color:var(--sky-deep)}
.logo-text span:last-child{display:block;font-size:10px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px}
.nav-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--gold-p);color:var(--gold);border:1px solid rgba(184,137,42,.25);letter-spacing:.5px}

/* HERO */
.hero{position:relative;min-height:100svh;display:flex;align-items:center;justify-content:center;overflow:hidden;padding-top:60px}
.hero-bg{position:absolute;inset:0;background:linear-gradient(160deg,#0369A1,#0c4a6e 50%,#082f49)}
.hero-pat{position:absolute;inset:0;z-index:1;opacity:.07;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.5) 0,rgba(255,255,255,.5) 1px,transparent 0,transparent 50%),repeating-linear-gradient(-45deg,rgba(255,255,255,.5) 0,rgba(255,255,255,.5) 1px,transparent 0,transparent 50%);background-size:30px 30px}
.hero-fade{position:absolute;bottom:0;left:0;right:0;height:180px;z-index:2;background:linear-gradient(to bottom,transparent,var(--off))}
.hero-arc{position:absolute;top:-40px;right:-80px;z-index:2;width:320px;height:320px;border-radius:50%;border:2px solid rgba(212,168,75,.3);pointer-events:none}
.hero-arc::after{content:'';position:absolute;inset:20px;border-radius:50%;border:1px solid rgba(212,168,75,.18)}
.hero-content{position:relative;z-index:3;text-align:center;color:#fff;padding:40px 20px 120px;max-width:760px;margin:0 auto;animation:hf .9s ease both}
@keyframes hf{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
